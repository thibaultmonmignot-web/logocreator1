<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Creator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}
.carousel {


/* changer image avec fade */
function showImage(i) {
  slide.style.opacity = 0;

  setTimeout(() => {
    slide.src = images[i];
    slide.style.opacity = 1;
  }, 300);
}

/* suivant */
function next() {
  index = (index + 1) % images.length;
  showImage(index);
}

/* précédent */
function prev() {
  index = (index - 1 + images.length) % images.length;
  showImage(index);
}

/* auto slide */
function startAuto() {
  interval = setInterval(next, 5000);
}

startAuto();

/* pause quand souris dessus */
document.querySelector(".carousel").addEventListener("mouseenter", () => {
  clearInterval(interval);
});

document.querySelector(".carousel").addEventListener("mouseleave", () => {
  startAuto();
});

/* IMAGE */
.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.8s ease;
  opacity: 1;
}

/* BOUTONS NAV */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: 1px solid white;
  color: white;
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
  transition: 0.3s;
}

.nav:hover {
  background: white;
  color: black;
}

.left { left: 10px; }
.right { right: 10px; }
/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  border-bottom: 1px solid #222;
}

nav h1 {
  font-size: 18px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h2 {
  font-size: 60px;
  margin: 0;
}

.hero h2 span {
  color: #00f0ff;
}

.hero p {
  opacity: 0.7;
  max-width: 600px;
  margin: 20px auto;
}

/* CARROUSEL */
.carousel {
  width: 70%;
  height: 400px;
  margin: 40px auto;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid #333;
  box-shadow: 0 0 30px rgba(255,255,255,0.1);
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.btn {
  padding: 12px 20px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  border: 1px solid #222;
  padding: 20px;
  width: 250px;
  border-radius: 10px;
}

/* PANEL */
.panel {
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<nav>
  <h1>LOGO CREATOR</h1>
  <div>
    <a href="#">Connexion</a>
    <a href="#">Commencer</a>
  </div>
</nav>

<div class="hero">
  <h2>Crée tes <span>logos</span></h2>
  <p>Transforme tes idées en designs modernes et professionnels en quelques secondes.</p>
</div>

<!-- CARROUSEL -->
<div class="carousel">
  <img id="slide" src="logo1.jpg">

  <button class="nav left" onclick="prev()">‹</button>
  <button class="nav right" onclick="next()">›</button>
</div>

<!-- BOUTONS -->
<div class="buttons">
  <button class="btn" onclick="showSMS()">Envoyer message</button>
  <button class="btn" onclick="showForm()">Formules</button>
  <button class="btn" onclick="showPremium()">Premium</button>
</div>

<!-- FORMULES -->
<div class="section panel" id="form">
  <h2>Formules</h2>
  <div class="cards">
    <div class="card">20€ → 1 logo</div>
    <div class="card">100€ → site + logo</div>
    <div class="card">200€ → pack pro</div>
  </div>
</div>

<!-- PREMIUM -->
<div class="section panel" id="premium">
  <h2>Premium</h2>
  <div class="card">120€ → site + logo + priorité + support</div>
</div>

<!-- MESSAGE -->
<div class="section panel" id="sms">
  <h2>Envoyer un message</h2>
  <input placeholder="ton message">
  <button class="btn">Envoyer</button>
</div>

<script>

let images = ["logo1.jpg","logo2.jpg","logo3.jpg"];
let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slide").src = images[i];
}, 5000);

function hideAll(){
  document.getElementById("form").style.display="none";
  document.getElementById("premium").style.display="none";
  document.getElementById("sms").style.display="none";
}

function showForm(){
  hideAll();
  document.getElementById("form").style.display="block";
}

function showPremium(){
  hideAll();
  document.getElementById("premium").style.display="block";
}

function showSMS(){
  hideAll();
  document.getElementById("sms").style.display="block";
}

</script>

</body>
</html>
