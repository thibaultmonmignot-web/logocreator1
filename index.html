<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Logo Creator</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin: 20px;
    }

    /* CARROUSEL */
    .carousel {
      width: 300px;
      height: 300px;
      margin: auto;
      position: relative;
    }

    .carousel img {
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    /* BOUTONS */
    .buttons {
      margin-top: 20px;
    }

    button {
      margin: 10px;
      padding: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: black;
      color: white;
    }

    .panel {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Logo Creator</h1>

<!-- CARROUSEL -->
<div class="carousel">
  <img id="slide" src="logo1.jpg">
</div>

<!-- BOUTONS -->
<div class="buttons">
  <button onclick="showSMS()">Envoyer un SMS</button>
  <button onclick="showPrices()">Formules</button>
  <button onclick="showPremium()">Premium 120€</button>
</div>

<!-- SMS -->
<div id="smsPanel" class="panel">
  <h3>Envoyer un SMS</h3>
  <input type="text" id="message" placeholder="Écris ton message">
  <button onclick="sendSMS()">Envoyer</button>
</div>

<!-- PRIX -->
<div id="pricePanel" class="panel">
  <h3>Formules</h3>
  <p>20€ = 1 logo</p>
  <p>100€ = site web + logo</p>
</div>

<!-- PREMIUM -->
<div id="premiumPanel" class="panel">
  <h3>Offre Premium</h3>
  <p>120€ = site web + logo + accès prioritaire</p>
</div>

<script>
  // CARROUSEL AUTO
  let images = ["logo1.jpg", "logo2.jpg", "logo3.jpg"];
  let index = 0;

  setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
  }, 5000);

  // PANELS
  function showSMS() {
    hideAll();
    document.getElementById("smsPanel").style.display = "block";
  }

  function showPrices() {
    hideAll();
    document.getElementById("pricePanel").style.display = "block";
  }

  function showPremium() {
    hideAll();
    document.getElementById("premiumPanel").style.display = "block";
  }

  function hideAll() {
    document.getElementById("smsPanel").style.display = "none";
    document.getElementById("pricePanel").style.display = "none";
    document.getElementById("premiumPanel").style.display = "none";
  }

  // SIMULATION SMS
  function sendSMS() {
    let msg = document.getElementById("message").value;
    alert("SMS envoyé (simulation) : " + msg);
  }
</script>

</body>
</html>
