<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Logo Creator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* TITRE */
h1 {
  margin-top: 20px;
  font-size: 30px;
}

/* CARROUSEL */
.carousel {
  width: 70%;
  height: 400px;
  margin: auto;
  margin-top: 30px;
  border-radius: 15px;
  overflow: hidden;
  border: 2px solid white;
  box-shadow: 0 0 20px white;
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BOUTONS */
.buttons {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

/* LED ANIMATION */
@keyframes led {
  0% { box-shadow: 0 0 5px white; }
  50% { box-shadow: 0 0 20px white; }
  100% { box-shadow: 0 0 5px white; }
}

.btn {
  padding: 15px 25px;
  border: 2px solid white;
  background: black;
  color: white;
  cursor: pointer;
  border-radius: 10px;
  position: relative;
  animation: led 2s infinite;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}

/* PANELS */
.panel {
  display: none;
  margin-top: 20px;
}

input {
  padding: 10px;
  width: 250px;
}

</style>
</head>

<body>

<h1>LOGO CREATOR</h1>

<!-- CARROUSEL -->
<div class="carousel">
  <img id="slide" src="logo1.jpg">
</div>

<!-- BOUTONS -->
<div class="buttons">

  <button class="btn" onclick="showSMS()">Envoyer un message</button>

  <button class="btn" onclick="showForm()">Formules</button>

  <button class="btn" onclick="showPremium()">Premium</button>

</div>

<!-- SMS -->
<div id="sms" class="panel">
  <h3>Envoyer un message</h3>
  <input id="msg" placeholder="Ton message">
  <button onclick="send()">Envoyer</button>
</div>

<!-- FORMULES -->
<div id="form" class="panel">
  <h3>Formules</h3>
  <p>20€ = 1 logo</p>
  <p>100€ = site + logo</p>
</div>

<!-- PREMIUM -->
<div id="premium" class="panel">
  <h3>Premium</h3>
  <p>120€ = site + logo + accès prioritaire</p>
</div>

<script>

/* CARROUSEL */
let images = ["logo1.jpg","logo2.jpg","logo3.jpg"];
let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slide").src = images[i];
}, 5000);

/* PANELS */
function hideAll(){
  document.getElementById("sms").style.display="none";
  document.getElementById("form").style.display="none";
  document.getElementById("premium").style.display="none";
}

function showSMS(){
  hideAll();
  document.getElementById("sms").style.display="block";
}

function showForm(){
  hideAll();
  document.getElementById("form").style.display="block";
}

function showPremium(){
  hideAll();
  document.getElementById("premium").style.display="block";
}

/* SIMULATION MESSAGE */
function send(){
  let msg = document.getElementById("msg").value;
  alert("Message envoyé : " + msg);
}

</script>

</body>
</html>
